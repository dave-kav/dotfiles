"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в•ӯ](fg:current_line)\
$os\
$status\
$directory\
$git_branch\
$git_status\
$fill\
$aws\
$golang\
$nodejs\
$bun\
$deno\
$python\
$java\
$zig\
$rust\
$c\
$cmd_duration\
$line_break\
$character\
"""

palette = 'tokyo_night_storm'
# palette = 'catppuccin_mocha'
# palette = 'tokyo_night'
add_newline = true

[palettes.catppuccin_mocha]
foreground = '#D9E0EE'
background = '#1E1E2E'
current_line = '#2E2E3E'
primary = '#313244'
box = '#2E2E3E'
blue = '#8AADF4'
cyan = '#76E3F6'
green = '#A6E3A1'
orange = '#F9AF74'
pink = '#F5BDE6'
purple = '#CBA6F7'
red = '#F38BA8'
yellow = '#F9E2AF'
status = "#e23140"

[palettes.tokyo_night_storm]
foreground = '#C0CAF5'
background = '#24283B'
current_line = '#2F3549'
primary = '#364A82'
box = '#2F3549'
blue = '#7AA2F7'
cyan = '#7DCFFF'
green = '#9ECE6A'
orange = '#FF9E64'
pink = '#BB9AF7'
purple = '#BB9AF7'
red = '#F7768E'
yellow = '#E0AF68'
status = '#F7768E'

[palettes.tokyo_night]
foreground = '#D8D8D8'
background = '#1A1B26'
current_line = '#2A2C37'
primary = '#292E42'
box = '#2A2C37'
blue = '#7AA2F7'
cyan = '#7FDBCA'
green = '#98C379'
orange = '#FF9E64'
pink = '#FF75A0'
purple = '#BB80B3'
red = '#F7768E'
yellow = '#E5C07B'
status = "#e23140"

[os]
format = '(fg:current_line)[оӮ¶](fg:red)[пҢғ](fg:primary bg:red)[оӮҙ](fg:red)'
disabled = true

[status]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:status)[оҪ¶](fg:primary bg:status)[оӮҙ](fg:status bg:box)[ $status](fg:foreground bg:box)[оӮҙ](fg:box)"
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = "[в”Җ](fg:current_line)[оӮ¶](fg:status)[оҪ¶](fg:primary bg:status)[оӮҙ](fg:status bg:box)[ $pipestatus](fg:foreground bg:box)[оӮҙ](fg:box)"
disabled = false

[directory]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[у°·Ҹ](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оӮҙ](fg:box)'
home_symbol = "оӯҶ ~/"
truncation_symbol = 'оҜҹ '
truncation_length = 2
read_only = 'уұ§ө '
read_only_style = ''

[git_branch]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $branch](fg:foreground bg:box)'
symbol = 'пҗ—'

[git_status]
conflicted = "вҡ”пёҸ "
ahead = "рҹҸҺпёҸ рҹ’Ё Г—${count} "
behind = "рҹҗў Г—${count} "
diverged = "рҹ”ұ рҹҸҺпёҸ рҹ’Ё Г—${ahead_count} рҹҗў Г—${behind_count} "
untracked = "рҹӣӨпёҸ  Г—${count} "
stashed = "рҹ“Ұ "
modified = "рҹ“қ Г—${count} "
staged = "рҹ—ғпёҸ  Г—${count} "
renamed = "рҹ“ӣ Г—${count} "
deleted = "рҹ—‘пёҸ  Г—${count} "
style = "bright-white"
format = "$all_status$ahead_behind"

[nodejs]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'у°Һҷ Node.js'

[bun]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оқҜ Bun'

[deno]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[$symbol](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'рҹҰ• Deno'

[zig]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[$symbol](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'вҡЎпёҸ Zig'

[rust]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[$symbol](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оһЁ Rust'

[python]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ (${version} )(\($virtualenv\) )](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңј python'

[java]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:red)[$symbol](fg:primary bg:red)[оӮҙ](fg:red bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңё Java'

[golang]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:red)[$symbol](fg:primary bg:red)[оӮҙ](fg:red bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'у°‘® Go'

[c]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[$symbol](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оҳһ C'

[terraform]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[$symbol](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңҸ Terraform'

[fill]
symbol = 'в”Җ'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
format = '[в”Җ](fg:current_line)[оӮ¶](fg:orange)[пғ§](fg:primary bg:orange)[оӮҙ](fg:orange bg:box)[ $duration](fg:foreground bg:box)[оӮҙ](fg:box)'

[time]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[у°Ұ–](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $time](fg:foreground bg:box)[оӮҙ](fg:box)'
time_format = '%H:%M'
disabled = false

[username]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[пҗ•](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $user](fg:foreground bg:box)[оӮҙ](fg:box) '
show_always = true

[character]
format = """
[в•°в”Җ$symbol](fg:current_line) """
success_symbol = '[пғҡ](fg:bold white)'
error_symbol = '[Г—](fg:bold red)'

[profiles]
transient = """$character"""
